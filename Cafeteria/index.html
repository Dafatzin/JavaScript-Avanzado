<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Loop y Asincornicidad</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-700">
    <nav> 
        <h1 class="text-[40px] text-center font-bold text-white">CAFETERÍA</h1>
    </nav>
    <main> 
      <section class="flex flex-wrap gap-10 items-center justify-center"> 
        <div id="Cafe" class="bg-gray-200 p-2"> 
         <img src="Cafe.jpg" class="w-20 h-auto" alt="Vaso Cafe">
         <p class="text-center font-bold">Café</p>
        </div>
        <div id="DonaChoc" class="bg-gray-200 p-2"> 
         <img src="Donachoc.jpg" class="w-20 h-auto" alt="Dona Chocolate">
         <p class="text-center font-bold">Dona <br>Chocolate</p>
        </div>
        <div id="DonaGlas" class="bg-gray-200 p-2"> 
         <img src="DonaGlas.jpg" class="w-20 h-auto" alt="Dona Glass">
         <p class="text-center font-bold">Dona <br>Glaseada</p>
        </div>
        <div id="Helado" class="bg-gray-200 p-2"> 
         <img src="Helado.jpg" class="w-20 h-auto" alt="Helado">
         <p class="text-center font-bold">Helado</p>
        </div>
      </section>  
      <section class="ml-4" >
        <h1 class="text-[25px] font-bold text-white"> Mis Pedidos</h1>
        <div id="Contenedor" class="flex flex-wrap">
         </div>  
        <button id="btn" class="bg-white text-black font-bold py-2 px-6 rounded mt-0">Agregar</button>
        <ul id="lista" style="display: none" class="bg-white w-20 text-black font-bold">
        <li>Café</li>
        <li>Dona Chocolate</li>
        <li>Dona Glaseada</li>
        <li>Helado</li>
        </ul>
      </section>
    </main>
    <script src="cafeteria.js"></script>
</body>
</html>
